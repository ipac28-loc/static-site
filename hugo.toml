baseURL = "https://test.ipac28.org/"
locale = "en-us"
title = "IPAC'28 - International Particle Accelerator Conference"

[markup.goldmark.renderer]
unsafe = true

[params]
logo_prefix = "IPAC"
logo_suffix = "'28"
logo_image = "/img/ipac28_1200x608.png"
favicon = "/img/ipac28_600x304.png"
conf_short_name = "IPAC'28"
conf_full_name = "19th International Particle Accelerator Conference"
conf_dates = "June 4-9, 2028"
conf_start_date = "2028-06-04T08:00:00+09:00"
conf_location = "Tokyo International Forum, Tokyo, Japan"
email = "contact@ipac28.org"
registration_link = "/register/register-conf/"
abstract_deadline = "December 5, 2027"

# Appearance & Toggles
hero_badge = "19th International Particle Accelerator Conference"
hero_image = "/img/ipac28_poster_a0.png"
about_image = "/img/kanko.png"
enable_countdown = true
enable_sponsors = true

# Global Announcement Banner
enable_announcement = true
# announcement_text = "Abstract submission will open on Oct 1, 2027!"
# announcement_link = "/authors/authors-abstract/"
announcement_text = "Welcome to the IPAC'28 Website!"
announcement_link = "/about/about-welcome/"

# Global date formatting style for all pages (standard Go layout)
date_fmt = "January 2, 2006"

# Centralized Important Dates & Milestones (Clean multi-line arrays for easy editing)
[[params.important_dates]]
date = "2026-04-23T00:00:00+09:00"
title = "IPAC'28 Website Opening"
type = "info"
description = "The IPAC'28 Website has been opened. We have prepared the contents of the homepage including program, registration, and venue information."

[[params.important_dates]]
date = "2027-04-01T00:00:00+09:00"
title = "Exhibitor Registration Opens"
type = "open"
description = "Exhibitor registration opens"

[[params.important_dates]]
date = "2027-10-01T00:00:00+09:00"
title = "Abstract Submission Opens"
type = "open"
description = "Abstract submission opens"

[[params.important_dates]]
date = "2027-10-01T00:00:00+09:00"
title = "Early Bird Registration Opens"
type = "open"
description = "Early bird registration opens"

[[params.important_dates]]
date = "2027-12-30T23:59:59+09:00"
title = "Abstract Submission Deadline"
type = "close"
description = "Abstract submission closes strictly at 23:59 JST. No late submissions or modifications will be processed."

[[params.important_dates]]
date = "2028-01-10T09:00:00+09:00"
title = "Regular Registration & Student Grant Opens"
type = "open"
description = "Early bird registration rate becomes active. Eligible students can apply for the IPAC'28 Travel Grant."

[[params.important_dates]]
date = "2028-03-10T09:00:00+09:00"
title = "Author Notification & Student Grant Deadline"
type = "info"
description = "Abstract decisions (Oral, Poster, or Rejection) are communicated to primary authors. Student grant applications close."

[[params.important_dates]]
date = "2028-04-01T23:59:59+09:00"
title = "Early Registration Rate Closes"
type = "close"
description = "Last day to register under the discounted early-bird rate. After this date, standard conference registration fees apply."

[[params.important_dates]]
date = "2028-05-20T23:59:59+09:00"
title = "Final Paper Submission Deadline"
type = "close"
description = "All contributions must upload their final, peer-review-ready PDF and source files (LaTeX/Word) to the JACoW Scientific Repository for editorial checks."

[[params.important_dates]]
date = "2028-06-04T12:00:00+09:00"
title = "Pre-Registration & Welcome Drink"
type = "info"
description = "Early badge pick-up and registration desk opens at the Tokyo International Forum, followed by the informal Welcome Drink in the evening."

[[params.important_dates]]
date = "2028-06-05T08:00:00+09:00"
title = "IPAC'28 Scientific Program"
type = "info"
description = "Timetable sessions, plenary keynotes, parallel talks, commercial exhibitions, and the official social banquet."

# Latest Updates & Announcements (shown on homepage, newest 3 displayed)
[[params.news]]
date = "2026-04-23T00:00:00+09:00"
title = "IPAC'28 Website Is Now Open"
summary = "The official IPAC'28 conference website has launched. Find information on the scientific program, registration, venue, and more."
link = "/about/about-welcome/"

[[params.news]]
date = "2026-05-01T00:00:00+09:00"
title = "Call for Abstracts: Coming Soon"
summary = "Abstract submission will open in October 2027 via the JACoW Indico portal. Authors are encouraged to prepare their contributions in advance."
link = "/authors/authors-abstract/"

[[params.news]]
date = "2026-05-15T00:00:00+09:00"
title = "Exhibitor Prospectus Now Available"
summary = "The exhibitor and sponsorship prospectus for IPAC'28 is now available for download. Secure prime booth space early — allocation is first-come, first-served."
link = "/exhibitor/exhibitor-info/"

# Sponsors & Industry Partners
