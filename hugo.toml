baseURL = "https://test.ipac28.org/"
languageCode = "en-us"
title = "IPAC'28 - International Particle Accelerator Conference"

[markup.goldmark.renderer]
unsafe = true

[params]
  logo_prefix = "IPAC"
  logo_suffix = "'28"
  logo_image = "/img/ipac28_1200x608.png"
  conf_short_name = "IPAC'28"
  conf_full_name = "16th International Particle Accelerator Conference"
  conf_dates = "June 5-9, 2028"
  conf_start_date = "2028-06-05T08:00:00+09:00"
  conf_location = "Tokyo International Forum, Tokyo, Japan"
  email = "contact@ipac28.org"
  registration_link = "/register/"
  abstract_deadline = "December 5, 2027"

  # Appearance & Toggles
  hero_badge = "16th International Conference"
  hero_image = "/img/ipac28_poster_a0.png"
  about_image = "/img/kanko.png"
  enable_countdown = true
  enable_sponsors = true

[params.social]
  twitter = "https://twitter.com/IPAC28"
  linkedin = "https://linkedin.com/company/ipac28"
  facebook = "https://facebook.com/ipac28"
  # github = "https://github.com/ipac..."

[params.stats]
  attendees = "1200+"
  presentations = "800+"
  exhibitors = "80+"

