<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
{{ if .Description }}
<meta name="description" content="{{ .Description }}">
{{ else }}
<meta name="description" content="Official website for the 16th International Particle Accelerator Conference. Join the worldwide particle accelerator community.">
{{ end }}

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">

{{ if .Site.Params.text_style }}
<style>
    :root {
        {{ with .Site.Params.text_style.font_family }}--font-sans-markdown: '{{ . }}', -apple-system, sans-serif;{{ end }}
        {{ with .Site.Params.text_style.heading_font_family }}--font-heading: '{{ . }}', sans-serif;{{ end }}
        {{ with .Site.Params.text_style.body_color }}--color-text-body-markdown: {{ . }};{{ end }}
        {{ with .Site.Params.text_style.heading_color }}--color-text-heading: {{ . }};{{ end }}
        {{ with .Site.Params.text_style.link_color }}
            --color-link-default: {{ . }};
            --color-btn-primary-bg: {{ . }};
            --color-btn-outline-border: {{ . }};
            --color-btn-outline-text: {{ . }};
            --color-btn-outline-bg-hover: {{ . }};
            --color-title-underline: {{ . }};
            --color-countdown-border-top: {{ . }};
            --color-countdown-divider: {{ . }};
            --color-stat-number: {{ . }};
            --color-date-card-icon-text: {{ . }};
            --color-date-card-border-hover: {{ . }};
            --color-sidebar-item-text-active: {{ . }};
            --color-news-date-text: {{ . }};
        {{ end }}
        {{ with .Site.Params.text_style.font_size }}--color-text-size: {{ . }};{{ end }}
        {{ with .Site.Params.text_style.line_height }}--color-line-height: {{ . }};{{ end }}
    }
</style>
{{ end }}
