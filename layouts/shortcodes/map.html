{{ $src := .Get "src" }}
{{ $title := .Get "title" }}
<div class="map-card">
    {{ if $title }}
        <div class="map-card-header">
            <h4><i class="fas fa-map-marker-alt"></i> {{ $title }}</h4>
        </div>
    {{ end }}
    <div class="map-container">
        <iframe src="{{ $src }}" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="{{ $title | default "Venue Map" }}"></iframe>
    </div>
</div>
