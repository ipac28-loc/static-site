{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "Conference Poster" }}
{{ $credit := .Get "credit" }}
{{ $thumbWidth := .Get "thumb_width" | default "150px" }}
{{ $dialogId := printf "poster-preview-dialog-%d" .Ordinal }}

{{ if $src }}
<style>
  #{{ $dialogId }}::backdrop {
    background: rgba(15, 23, 42, 0.78);
    backdrop-filter: blur(3px);
    animation: poster-preview-backdrop-in 180ms ease-out both;
  }

  #{{ $dialogId }}[open] {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #{{ $dialogId }}[open].is-closing::backdrop {
    animation: poster-preview-backdrop-out 160ms ease-in both;
  }

  #{{ $dialogId }} [data-poster-preview-content] {
    animation: poster-preview-in 180ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  #{{ $dialogId }}.is-closing [data-poster-preview-content] {
    animation: poster-preview-out 160ms ease-in both;
  }

  @keyframes poster-preview-backdrop-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes poster-preview-backdrop-out {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  @keyframes poster-preview-in {
    from {
      opacity: 0;
      transform: translateY(10px) scale(0.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes poster-preview-out {
    from {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    to {
      opacity: 0;
      transform: translateY(6px) scale(0.97);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #{{ $dialogId }}::backdrop,
    #{{ $dialogId }}[open].is-closing::backdrop,
    #{{ $dialogId }} [data-poster-preview-content],
    #{{ $dialogId }}.is-closing [data-poster-preview-content] {
      animation: none;
    }
  }
</style>

<figure style="margin: 2rem auto; text-align: center;">
  <button
    type="button"
    onclick="const dialog = document.getElementById('{{ $dialogId }}'); dialog.classList.remove('is-closing'); dialog.showModal()"
    aria-label="Preview {{ $alt }}"
    style="display: inline-block; padding: 0; border: 0; background: transparent; cursor: zoom-in;"
  >
    <img
      src="{{ $src | relURL }}"
      alt="{{ $alt }}"
      style="display: block; width: min({{ $thumbWidth }}, 64vw); height: auto; border-radius: 0.5rem; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);"
    >
  </button>
  {{ with $credit }}
  <figcaption style="margin-top: 1rem; font-size: 0.75rem; color: var(--color-brand-secondary, #1d4485); letter-spacing: 0.01em;">
    {{ . }}
  </figcaption>
  {{ end }}
</figure>

<dialog
  id="{{ $dialogId }}"
  aria-label="{{ $alt }} Preview"
  onclick="this.classList.add('is-closing'); setTimeout(() => { this.classList.remove('is-closing'); this.close(); }, 160)"
  oncancel="event.preventDefault(); this.classList.add('is-closing'); setTimeout(() => { this.classList.remove('is-closing'); this.close(); }, 160)"
  style="position: fixed; inset: 0; width: 100vw; max-width: none; height: 100dvh; max-height: none; margin: 0; padding: 1rem; box-sizing: border-box; border: 0; background: transparent; overflow: hidden;"
>
  <div data-poster-preview-content style="position: relative; display: flex; flex-direction: column; align-items: center; gap: 0.75rem;">
    <button
      type="button"
      aria-label="Close poster preview"
      style="position: absolute; top: 0.5rem; right: 0.5rem; z-index: 1; width: 2.25rem; height: 2.25rem; border: 0; border-radius: 999px; background: #ffffff; color: #0f172a; font-size: 1.5rem; line-height: 1; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.28); cursor: pointer;"
    >&times;</button>
    <img
      src="{{ $src | relURL }}"
      alt="{{ $alt }}"
      style="display: block; max-width: calc(100vw - 2rem); max-height: calc(100dvh - 6.5rem); width: auto; height: auto; border-radius: 0.5rem; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.36); background: #ffffff;"
    >
    {{ with $credit }}
    <p style="margin: 0; padding: 0.35rem 0.7rem; border-radius: 999px; background: rgba(255, 255, 255, 0.92); color: var(--color-brand-secondary, #1d4485); font-size: 0.75rem;">
      {{ . }}
    </p>
    {{ end }}
  </div>
</dialog>
{{ end }}
