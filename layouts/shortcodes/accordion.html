<div x-data="{ open: false }" class="border border-slate-100 dark:border-slate-800 rounded-xl overflow-hidden bg-white dark:bg-slate-900 shadow-sm mb-4">
    <button
        @click="open = !open"
        class="w-full flex items-center justify-between p-5 text-left font-heading font-bold text-slate-800 dark:text-slate-100 hover:text-brand-primary dark:hover:text-brand-primary hover:bg-slate-50/50 dark:hover:bg-slate-850/40 transition-colors select-none cursor-pointer border-0 outline-none bg-transparent"
    >
        <span>{{ .Get "title" | default "Details" }}</span>
        <i class="fas fa-chevron-right text-xs text-slate-400 dark:text-slate-500 transition-transform duration-200" :class="open ? 'rotate-90 text-brand-primary' : ''"></i>
    </button>
    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-y-1"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="p-5 border-t border-slate-50 dark:border-slate-800 text-slate-600 dark:text-slate-300 text-sm leading-relaxed"
        style="display: none;"
    >
        {{ .Inner | markdownify }}
    </div>
</div>
