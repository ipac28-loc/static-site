{{ define "main" }}
<!-- Page Hero -->
<section class="relative pt-32 pb-16 md:pt-40 md:pb-20 bg-gradient-to-br from-brand-dark via-[#1a3a73] to-brand-secondary overflow-hidden">
    <div class="absolute inset-0 bg-black/20 z-0"></div>
    <div class="container relative z-10">
        <div class="flex flex-col items-start">
            <nav class="flex items-center gap-2 text-white/80 text-xs font-medium uppercase tracking-wider mb-4 fade-up visible bg-white/10 border border-white/10 px-3 py-1.5 rounded-full backdrop-blur-sm">
                <a href="{{ `/` | relURL }}" class="hover:text-white transition-colors flex items-center gap-1.5">
                    <i class="fas fa-home text-[10px]"></i> Home
                </a>
                <span class="text-white/30 text-[9px]"><i class="fas fa-chevron-right"></i></span>
                <span class="text-white font-semibold">{{ .Title }}</span>
            </nav>
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-heading font-extrabold text-white tracking-tight drop-shadow-sm fade-up visible delay-1">
                {{ .Title }}
            </h1>
        </div>
    </div>
</section>

<!-- Main Container -->
<main class="py-16 md:py-20 bg-brand-bg-light text-slate-700">
    <div class="container max-w-4xl mx-auto fade-up visible delay-2">
        <div class="bg-white rounded-2xl p-8 sm:p-10 shadow-sm border border-slate-100 min-h-[400px]">
            <h2 class="text-2xl font-heading font-extrabold text-brand-secondary mb-4 leading-tight">Index of Sections</h2>
            <div class="h-1 w-12 bg-brand-primary rounded-full mb-8"></div>
            
            <ul class="divide-y divide-slate-100">
                {{ range .Pages }}
                    <li class="py-4 hover:bg-slate-50/50 rounded-lg transition-colors px-4 -mx-4 group">
                        <a href="{{ .Permalink }}" class="flex items-center justify-between font-medium text-slate-700 hover:text-brand-primary transition-colors">
                            <span class="flex items-center gap-3">
                                <i class="far fa-file-alt text-brand-primary/65 group-hover:text-brand-primary text-base"></i>
                                <span>{{ .Title }}</span>
                            </span>
                            <i class="fas fa-chevron-right text-xs opacity-0 -translate-x-1 group-hover:opacity-100 group-hover:translate-x-0 transition-all"></i>
                        </a>
                    </li>
                {{ end }}
            </ul>
        </div>
    </div>
</main>
{{ end }}
